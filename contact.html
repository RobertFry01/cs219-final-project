<section class="contact-grid">
    <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Email: student@university.edu</p>
        <!-- Map Placeholder -->
        <div class="map-placeholder" style="background: #e2e8f0; height: 200px; border-radius: var(--border-radius);">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3082.061430893376!2d-77.4186862!3d39.4227353!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c9daff5e06ed1b%3A0x494dd01a4bc6b0a3!2sHood%20College!5e0!3m2!1sen!2sus!4v1778615159098!5m2!1sen!2sus" 
            width="300" 
            height="200" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

    <form id="contactForm" novalidate>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-primary">Send Message</button>
    </form>
</section>
